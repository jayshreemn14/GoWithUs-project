<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Destination — GoWithUs</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">

  <style>
    :root{
      --page-max: 1100px;
    }
    body{
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:#f8fafc;
    }

    /* Header */
    header.site-header{
      background:#fff;
      box-shadow:0 1px 4px rgba(15,23,42,0.06);
    }
    header .header-inner{
      max-width:var(--page-max);
      margin:0 auto;
      padding:10px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    /* Hero */
    .hero-banner{
      max-width:var(--page-max);
      margin:16px auto 0;
      border-radius:24px;
      overflow:hidden;
      position:relative;
      background:#000;
      box-shadow:0 18px 40px rgba(15,23,42,0.25);
      color:#fff;
    }
    .hero-image{
      width:100%;
      height:320px;
      object-fit:cover;
      display:block;
      filter:brightness(0.82);
    }
    .hero-content{
      position:absolute;
      inset:0;
      padding:16px 22px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      pointer-events:none;
    }
    .hero-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:4px 10px;
      border-radius:999px;
      background:rgba(15,23,42,0.7);
      font-size:12px;
    }
    .hero-title{
      font-size:30px;
      font-weight:800;
      letter-spacing:0.02em;
      text-shadow:0 10px 24px rgba(15,23,42,0.7);
    }
    .hero-bottom{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:16px;
    }
    .hero-about{
      max-width:56%;
      background:rgba(15,23,42,0.82);
      padding:10px 14px;
      border-radius:18px;
      pointer-events:auto;
    }
    .hero-about-title{
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:0.14em;
      opacity:0.9;
    }
    .hero-about-text{
      margin-top:4px;
      font-size:13px;
      line-height:1.4;
      opacity:0.96;
    }
    .hero-price-card{
      pointer-events:auto;
      background:rgba(15,23,42,0.9);
      padding:10px 16px;
      border-radius:18px;
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      gap:6px;
      min-width:170px;
    }
    .hero-price{
      font-size:20px;
      font-weight:800;
    }
    .hero-price small{
      font-size:11px;
      font-weight:400;
      opacity:0.85;
      margin-left:4px;
    }
    .btn-book-hero{
      border:none;
      border-radius:999px;
      padding:8px 16px;
      font-size:13px;
      font-weight:700;
      cursor:pointer;
      background:linear-gradient(135deg,#f97316,#ec4899);
      color:#fff;
      box-shadow:0 10px 25px rgba(236,72,153,0.5);
    }

    /* Main layout */
    main.page-main{
      max-width:var(--page-max);
      margin:18px auto 40px;
      padding:0 12px;
      display:grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(0, 1.1fr);
      gap:18px;
      align-items:flex-start;
    }

    .panel{
      background:#fff;
      border-radius:18px;
      padding:16px 18px;
      box-shadow:0 10px 28px rgba(15,23,42,0.10);
      border:1px solid #e5e7eb;
    }
    .panel h2{
      margin:0 0 10px;
      font-size:18px;
    }
    .section-row{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      margin-top:8px;
    }
    .tag-pill{
      padding:6px 10px;
      border-radius:999px;
      background:#f1f5f9;
      font-size:13px;
    }
    .section-label{
      font-size:13px;
      font-weight:600;
      color:#64748b;
      text-transform:uppercase;
      letter-spacing:0.18em;
    }

    .best-time-box{
      margin-top:10px;
      padding:10px 12px;
      border-radius:14px;
      background:#f1f5f9;
      font-size:14px;
      display:flex;
      align-items:center;
      gap:10px;
    }

    /* Booking panel (two-step) */
    .step-indicator{
      display:flex;
      gap:8px;
      margin-bottom:12px;
      font-size:12px;
      font-weight:600;
      text-transform:uppercase;
      letter-spacing:0.12em;
      color:#64748b;
    }
    .step-indicator span.active{
      color:#ec4899;
    }

    .booking-form-step{
      display:none;
    }
    .booking-form-step.active{
      display:block;
    }

    .booking-panel label{
      display:block;
      font-size:13px;
      font-weight:600;
      margin-top:10px;
      color:#0f172a;
    }
    .booking-panel .input{
      width:100%;
      box-sizing:border-box;
      margin-top:6px;
      padding:8px 10px;
      border-radius:10px;
      border:1px solid #e5e7eb;
      font-size:14px;
    }
    .booking-panel textarea.input{
      min-height:70px;
      resize:vertical;
    }

    .booking-row{
      display:flex;
      gap:10px;
      margin-top:6px;
    }
    .booking-row > div{
      flex:1;
    }

    .booking-actions{
      margin-top:14px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
    }

    .btn{
      border-radius:999px;
      padding:8px 14px;
      border:1px solid #e5e7eb;
      background:#fff;
      cursor:pointer;
      font-size:13px;
      font-weight:600;
    }
    .btn-primary{
      border:none;
      background:linear-gradient(135deg,#f97316,#ec4899);
      color:#fff;
      box-shadow:0 10px 24px rgba(236,72,153,0.45);
    }

    .total-box{
      margin-top:10px;
      padding:8px 10px;
      border-radius:12px;
      background:#fff7ed;
      border:1px solid #fed7aa;
      font-size:13px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    .total-box span.total-amount{
      font-weight:800;
      color:#b91c1c;
      font-size:16px;
    }

    #b-msg{
      margin-top:6px;
      font-size:13px;
    }

    @media (max-width:960px){
      .hero-image{ height:260px; }
      .hero-about{ max-width:100%; }
      main.page-main{
        grid-template-columns: 1fr;
      }
    }

    @media (max-width:640px){
      header .header-inner{
        flex-direction:column;
        align-items:flex-start;
        gap:8px;
      }
      .hero-title{ font-size:22px; }
      .hero-image{ height:240px; }
      .hero-content{ padding:12px 14px; }
      .hero-about-title{ font-size:12px; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <a href="/static/index.html" style="font-weight:800;color:#ec4899;text-decoration:none;font-size:18px;">GoWithUs</a>
      <nav class="site-nav">
        <a href="/static/index.html">Home</a>
        <a href="/static/destinations.html" class="active">Destinations</a>
        <a href="/static/my_bookings.html">My Bookings</a>
        <a href="/static/profile.html">Profile</a>
      </nav>
    </div>
  </header>

  <!-- Hero -->
  <section id="hero-wrapper"></section>

  <!-- Main two-column layout -->
  <main class="page-main">
    <!-- Left: Details -->
    <section id="details-panel" class="panel"></section>

    <!-- Right: Booking two-step panel -->
    <section id="booking-panel" class="panel booking-panel">
      <div class="step-indicator">
        <span id="step-label-1" class="active">1. Personal Info</span>
        <span>›</span>
        <span id="step-label-2">2. Trip Details</span>
      </div>

      <div id="booking-step-1" class="booking-form-step active">
        <label for="b-fullname">Full Name *</label>
        <input id="b-fullname" class="input" type="text">

        <label for="b-email">Email *</label>
        <input id="b-email" class="input" type="email">

        <label for="b-phone">Phone *</label>
        <input id="b-phone" class="input" type="tel" placeholder="Your contact number">

        <div class="booking-actions">
          <button id="b-cancel-1" class="btn" type="button">Cancel</button>
          <button id="b-next" class="btn btn-primary" type="button">Next</button>
        </div>
      </div>

      <div id="booking-step-2" class="booking-form-step">
        <div class="booking-row">
          <div>
            <label for="b-checkin">Check-in Date *</label>
            <input id="b-checkin" type="date" class="input">
          </div>
          <div>
            <label for="b-checkout">Check-out Date *</label>
            <input id="b-checkout" type="date" class="input">
          </div>
        </div>

        <div class="booking-row">
          <div>
            <label for="b-guests">Number of Travelers *</label>
            <input id="b-guests" type="number" min="1" value="1" class="input">
          </div>
          <div>
            <label for="b-accommodation">Accommodation Type *</label>
            <select id="b-accommodation" class="input">
              <option value="">Select</option>
              <option value="Hotel">Hotel</option>
              <option value="Resort">Resort</option>
              <option value="Villa">Villa</option>
              <option value="Hostel">Hostel</option>
              <option value="Apartment">Apartment</option>
              <option value="Guesthouse">Guesthouse</option>
            </select>
          </div>
        </div>

        <label for="b-requests">Special Requests</label>
        <textarea id="b-requests" class="input"
          placeholder="Any special requirements or preferences..."></textarea>

        <div id="total-box" class="total-box">
          <div id="total-label-text">Total</div>
          <span id="b-total" class="total-amount">₹0</span>
        </div>

        <div class="booking-actions">
          <button id="b-back" class="btn" type="button">Back</button>
          <button id="b-submit" class="btn btn-primary" type="button">Confirm Booking</button>
        </div>

        <div id="b-msg"></div>
      </div>
    </section>
  </main>

  <footer style="text-align:center;color:#64748b;font-size:13px;margin-bottom:16px;">
    © GoWithUs — demo layout
  </footer>

  <script>
    // ---------- helpers ----------
    function escapeHtml(s){
      if (s === undefined || s === null) return '';
      return String(s).replace(/[&<>"']/g, m =>
        ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])
      );
    }
    function formatPrice(n){
      if (!n) n = 0;
      return '₹' + Number(n).toLocaleString();
    }
    function normalizeList(value){
      if (!value) return [];
      if (Array.isArray(value)) return value;
      if (typeof value === 'string'){
        return value.split(',').map(x => x.trim()).filter(Boolean);
      }
      if (typeof value === 'object'){
        return Object.values(value).map(x => String(x));
      }
      return [];
    }

    async function fetchDestinationById(id){
      try{
        let res = await fetch('/api/destination/' + encodeURIComponent(id));
        if (!res.ok){
          res = await fetch('/api/destination?dest=' + encodeURIComponent(id));
        }
        if (!res.ok) throw new Error('fetch failed');
        return await res.json();
      }catch(e){
        console.error(e);
        return null;
      }
    }

    // ---------- build hero + details ----------
    function renderHero(d){
      const hero = document.getElementById('hero-wrapper');
      const img = escapeHtml(d.image_url || '/static/images/placeholder.jpg');
      const price = formatPrice(d.price);
      const rating = (d.rating != null) ? Number(d.rating).toFixed(1) : '4.5';
      const category = escapeHtml(d.category || 'Destination');
      const aboutText = d.description ? escapeHtml(d.description) : 'Discover this beautiful destination.';

      hero.innerHTML = `
        <article class="hero-banner">
          <img class="hero-image" src="${img}" alt="${escapeHtml(d.name)}">
          <div class="hero-content">
            <div class="hero-top">
              <div class="pill">${category}</div>
              <div style="display:flex;align-items:center;gap:8px;">
                <div class="pill">
                  ⭐ <strong>${rating}</strong>
                  <span style="opacity:.65;font-size:11px;">rating</span>
                </div>
              </div>
            </div>
            <div class="hero-bottom">
              <div class="hero-about">
                <div class="hero-about-title">About This Destination</div>
                <div class="hero-title">${escapeHtml(d.name)}</div>
                <div class="hero-about-text">${aboutText}</div>
              </div>
              <div class="hero-price-card">
                <div class="hero-price">
                  ${price}<small>/night</small>
                </div>
                <button class="btn-book-hero" id="hero-book-btn">Book Now</button>
              </div>
            </div>
          </div>
        </article>
      `;
    }

    function renderDetails(d){
      const highlights = normalizeList(d.highlights);
      const activities = normalizeList(d.activities);
      const bestTime = d.best_time_to_visit || 'Information coming soon.';

      const container = document.getElementById('details-panel');
      container.innerHTML = `
        <div>
          <div class="section-label">Location</div>
          <div style="margin-top:4px;font-size:14px;">${escapeHtml(d.location || 'Beautiful destination in India')}</div>
        </div>

        <div style="margin-top:16px;">
          <div class="section-label">Highlights</div>
          <div class="section-row" id="highlight-row">
            ${
              highlights.length
                ? highlights.map(h => `<span class="tag-pill">${escapeHtml(h)}</span>`).join('')
                : '<span class="muted" style="font-size:13px;">Highlights coming soon.</span>'
            }
          </div>
        </div>

        <div style="margin-top:16px;">
          <div class="section-label">Activities</div>
          <div class="section-row" id="activity-row">
            ${
              activities.length
                ? activities.map(a => `<span class="tag-pill">${escapeHtml(a)}</span>`).join('')
                : '<span class="muted" style="font-size:13px;">Activities information coming soon.</span>'
            }
          </div>
        </div>

        <div style="margin-top:16px;">
          <div class="section-label">Best Time To Visit</div>
          <div class="best-time-box">
            <span style="font-size:20px;">📅</span>
            <div>${escapeHtml(bestTime)}</div>
          </div>
        </div>
      `;
    }

    // ---------- booking behaviour ----------
    function setupBookingBehaviour(d){
      const step1 = document.getElementById('booking-step-1');
      const step2 = document.getElementById('booking-step-2');
      const label1 = document.getElementById('step-label-1');
      const label2 = document.getElementById('step-label-2');

      const fullNameEl = document.getElementById('b-fullname');
      const emailEl = document.getElementById('b-email');
      const phoneEl = document.getElementById('b-phone');
      const checkInEl = document.getElementById('b-checkin');
      const checkOutEl = document.getElementById('b-checkout');
      const guestsEl = document.getElementById('b-guests');
      const accomEl = document.getElementById('b-accommodation');
      const requestsEl = document.getElementById('b-requests');
      const totalEl = document.getElementById('b-total');
      const msgEl = document.getElementById('b-msg');

      // prefill from localStorage
      fullNameEl.value = localStorage.getItem('gowithus_user_name') || '';
      emailEl.value = localStorage.getItem('gowithus_user_email') || '';

      function goToStep(step){
        if (step === 1){
          step1.classList.add('active');
          step2.classList.remove('active');
          label1.classList.add('active');
          label2.classList.remove('active');
        }else{
          step1.classList.remove('active');
          step2.classList.add('active');
          label1.classList.remove('active');
          label2.classList.add('active');
        }
      }

      document.getElementById('b-cancel-1').onclick = () => {
        window.location.href = '/static/destinations.html';
      };

      document.getElementById('b-next').onclick = () => {
        msgEl.textContent = '';
        if (!fullNameEl.value.trim() || !emailEl.value.trim() || !phoneEl.value.trim()){
          alert('Please fill your full name, email and phone.');
          return;
        }
        goToStep(2);
        document.getElementById('booking-panel').scrollIntoView({behavior:'smooth', block:'start'});
      };

      document.getElementById('b-back').onclick = () => {
        goToStep(1);
      };

      // compute total
      const pricePerNight = Number(d.price || 0);
      function computeTotal(){
        const ci = checkInEl.value;
        const co = checkOutEl.value;
        const g = Math.max(1, Number(guestsEl.value || 1));
        let nights = 0;
        if (ci && co){
          const a = new Date(ci);
          const b = new Date(co);
          nights = Math.round((b - a)/(1000*60*60*24));
        }
        let total = 0;
        if (nights > 0){
          total = nights * pricePerNight * g;
          document.getElementById('total-label-text').textContent =
            `${nights} night${nights>1?'s':''} × ${formatPrice(pricePerNight)}`;
        }else{
          document.getElementById('total-label-text').textContent = 'Total';
        }
        totalEl.textContent = formatPrice(total);
      }

      [checkInEl, checkOutEl, guestsEl].forEach(el => {
        el.addEventListener('change', computeTotal);
        el.addEventListener('input', computeTotal);
      });

      // Confirm booking
      document.getElementById('b-submit').onclick = async () => {
        msgEl.style.color = '#64748b';
        msgEl.textContent = '';

        const fullname = fullNameEl.value.trim();
        const email = emailEl.value.trim();
        const phone = phoneEl.value.trim();
        const check_in = checkInEl.value;
        const check_out = checkOutEl.value;
        const guests = Math.max(1, Number(guestsEl.value || 1));
        const accommodation_type = accomEl.value;
        const special_requests = requestsEl.value.trim();

        const uid = localStorage.getItem('gowithus_user_id');
        if (!uid){
          msgEl.style.color = '#ef4444';
          msgEl.textContent = 'Please login first to complete your booking.';
          setTimeout(() => {
            location.href = '/static/login.html';
          }, 800);
          return;
        }

        if (!fullname || !email || !phone || !check_in || !check_out || !accommodation_type){
          msgEl.style.color = '#ef4444';
          msgEl.textContent = 'Please fill all required fields.';
          return;
        }

        msgEl.style.color = '#64748b';
        msgEl.textContent = 'Booking...';

        const headers = {
          'Content-Type': 'application/json',
          'X-User-Id': uid
        };

        try{
          const res = await fetch('/api/book', {
            method:'POST',
            headers,
            body: JSON.stringify({
              destination_id: d.id,
              full_name: fullname,
              email,
              guests,
              check_in,
              check_out,
              phone,
              accommodation_type,
              special_requests
            })
          });

          const j = await res.json().catch(() => ({}));

          if (!res.ok){
            msgEl.style.color = '#ef4444';
            msgEl.textContent = j.error || 'Booking failed';
            return;
          }

          localStorage.setItem('gowithus_user_name', fullname);
          localStorage.setItem('gowithus_user_email', email);

          msgEl.style.color = '#16a34a';
          msgEl.textContent = 'Booked! Total: ' + formatPrice(j.total) + '. Redirecting to My Bookings...';

          setTimeout(() => {
            location.href = '/static/my_bookings.html';
          }, 900);

        }catch(err){
          console.error(err);
          msgEl.style.color = '#ef4444';
          msgEl.textContent = 'Network error';
        }
      };

      // Hero "Book Now" scrolls to step 1
      document.addEventListener('click', e => {
        if (e.target && e.target.id === 'hero-book-btn'){
          e.preventDefault();
          goToStep(1);
          document.getElementById('booking-panel').scrollIntoView({behavior:'smooth', block:'start'});
          fullNameEl.focus();
        }
      });
    }

    // ---------- init ----------
    async function init(){
      const params = new URLSearchParams(location.search);
      const id = params.get('dest') || params.get('id');
      if (!id){
        document.getElementById('hero-wrapper').innerHTML =
          '<p style="max-width:var(--page-max);margin:24px auto;color:#64748b;">No destination id specified.</p>';
        return;
      }

      const d = await fetchDestinationById(id);
      if (!d){
        document.getElementById('hero-wrapper').innerHTML =
          '<p style="max-width:var(--page-max);margin:24px auto;color:#b91c1c;">Failed to load destination.</p>';
        return;
      }

      renderHero(d);
      renderDetails(d);
      setupBookingBehaviour(d);
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
